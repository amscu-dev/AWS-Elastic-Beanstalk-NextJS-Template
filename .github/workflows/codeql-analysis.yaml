name: CodeQL

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 10 * * 1"
run-name: "CodeQL Analysis - ${{ github.event_name }} by @${{ github.actor }}"
permissions:
  actions: read
  checks: write
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        id: initialize
        uses: github/codeql-action/init@v4
        with:
          config-file: .github/codeql/codeql-config.yaml
          languages: ${{ matrix.language }}
          source-root: src

      - name: Autobuild
        id: autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@v4
