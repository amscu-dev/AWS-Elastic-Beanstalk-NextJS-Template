name: Test & Build - Reusable Workflow

on:
  workflow_call:

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v6

      - name: Setup Node Environment
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Check for Formatting Errors
        run: npm run format:check

      - name: Check for Linting Errors
        run: npm run lint:ci

      - name: Run Unit Tests
        run: npm run test

      - name: Upload Test Coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage/

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build Project
        run: npm run build
        env:
          FLAGSMITH_KEY: ${{ secrets.FLAGSMITH_KEY }}

      - name: Upload Build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build
          path: .next/

      - name: Store Playwright`s Version
        id: playwright-version
        run: |
          PLAYWRIGHT_VERSION=$(npm ls @playwright/test | grep @playwright | sed 's/.*@//' | head -1)
          echo "Playwright Version: $PLAYWRIGHT_VERSION"
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT
      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        id: cache-playwright-browsers
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

      - name: Install Playwright Browsers
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          FLAGSMITH_KEY: ${{ secrets.FLAGSMITH_KEY }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/

      - name: Send a Slack Message on Failure
        uses: slackapi/slack-github-action@v3.0.1
        if: failure()
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🛑 *<https://github.com/${{github.repository}}/actions/runs/${{ github.run_id }}|${{ github.workflow }} workflow run>* failed."
                  }
                }
              ]
            }
