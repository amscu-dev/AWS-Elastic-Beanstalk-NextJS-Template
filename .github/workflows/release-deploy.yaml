name: Release Deploy

run-name: "Release Deploy v${{ github.ref_name }}"

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    uses: ./.github/workflows/test-build.yaml
    secrets: inherit

  deploy-to-staging:
    needs: run-tests
    uses: ./.github/workflows/deploy.yaml
    secrets: inherit
    with:
      aws-env: ${{ vars.AWS_EB_STAGING_ENV }}
      github-env: "staging"

  run-e2e-tests:
    needs: deploy-to-staging
    uses: ./.github/workflows/e2e-tests.yaml
    secrets: inherit
    with:
      base-url: ${{ needs.deploy-to-staging.outputs.aws-url }}

  deploy-to-production:
    needs: run-e2e-tests
    uses: ./.github/workflows/deploy.yaml
    secrets: inherit
    with:
      aws-env: ${{ vars.AWS_EB_PRODUCTION_ENV }}
      github-env: "production"
