name: CI
run-name: CI Pipeline - PR#${{ github.event.pull_request.number }} by @${{ github.actor }}
on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  secret-scan-gitleaks:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  dependency-review:
    uses: ./.github/workflows/dependency-review.yaml
    permissions:
      contents: read
      pull-requests: write

  run-tests:
    needs: dependency-review
    uses: ./.github/workflows/test-build.yaml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      FLAGSMITH_KEY: ${{ secrets.FLAGSMITH_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    permissions:
      pull-requests: write
  scan-gitguardian:
    uses: ./.github/workflows/gitguardian.yaml
    permissions:
      contents: read
    secrets:
      GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
